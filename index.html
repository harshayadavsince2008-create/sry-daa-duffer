<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>One Honest Thing</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:linear-gradient(120deg,#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Poppins',sans-serif;
  transition:background 2s ease;
}

body.fade-out{ background:#111 }

.heart{
  position:absolute;
  bottom:-30px;
  font-size:20px;
  opacity:.6;
  animation:floatUp linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(0) scale(1);opacity:.6}
  to{transform:translateY(-120vh) scale(1.5);opacity:0}
}

.box{
  background:white;
  width:560px;
  min-height:460px;
  padding:38px;
  border-radius:28px;
  box-shadow:0 30px 60px rgba(0,0,0,.28);
  text-align:center;
  z-index:2;
  animation:pop .6s ease;
}

@keyframes pop{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

h1{
  font-family:'Pacifico',cursive;
  color:#ff4f73;
  margin-top:0;
}

p{font-size:16px;color:#333;margin:12px 0}
.small{font-size:14px;color:#666}

button{
  margin-top:18px;
  padding:14px 26px;
  border:none;
  border-radius:16px;
  background:#ff6f91;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:.25s;
}

button:hover{
  background:#ff4f73;
  transform:scale(1.07);
}

.buttons{
  margin-top:35px;
  position:relative;
  height:160px;
}

.btn-angry{
  position:absolute;
  left:40px;
  top:60px;
  transition:transform .18s ease;
}

.btn-soft{
  position:absolute;
  right:40px;
  top:60px;
  background:#6a5acd;
}

.btn-soft:hover{background:#5949c9}

.photo{
  width:240px;
  height:240px;
  object-fit:cover;
  border-radius:22px;
  margin-top:20px;
  box-shadow:0 18px 36px rgba(0,0,0,.3);
  animation:fadeIn 1s ease;
}

video{
  width:100%;
  border-radius:18px;
  margin-top:20px;
  box-shadow:0 18px 36px rgba(0,0,0,.3);
  animation:fadeIn .8s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(.95)}
  to{opacity:1;transform:scale(1)}
}
</style>
</head>

<body>

<div id="hearts"></div>

<div class="box" id="app">
  <h1>Hey… One Honest Thing 💌</h1>
  <p>I know you’re upset.</p>
  <p class="small">And I won’t pretend that’s not on me.</p>
  <button onclick="clickSound();step1()">Continue</button>
</div>

<audio id="bgSong" src="song.mp3"></audio>

<script>
const app = document.getElementById("app");
const song = document.getElementById("bgSong");

/* Floating hearts */
setInterval(()=>{
  const h=document.createElement("div");
  h.className="heart";
  h.innerText="💖";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=14+Math.random()*20+"px";
  h.style.animationDuration=4+Math.random()*4+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),8000);
},400);

/* Sounds */
const ctx=new (window.AudioContext||window.webkitAudioContext)();

function clickSound(){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.frequency.value=520;
  g.gain.value=.04;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.08);
}

function dodgeSound(){
  const o=ctx.createOscillator(),g=ctx.createGain();
  o.type="square";
  o.frequency.value=180;
  g.gain.value=.05;
  o.connect(g);g.connect(ctx.destination);
  o.start();o.stop(ctx.currentTime+.1);
}

/* Smooth music fading helpers */
function fadeOutMusic(){
  let v = song.volume;
  const i = setInterval(()=>{
    v -= 0.05;
    song.volume = Math.max(v, 0);
    if(v <= 0){
      song.pause();
      clearInterval(i);
    }
  },150);
}

function fadeInMusic(){
  song.play();
  let v = 0;
  song.volume = 0;
  const i = setInterval(()=>{
    v += 0.05;
    song.volume = Math.min(v, 1);
    if(v >= 1) clearInterval(i);
  },150);
}

/* Flow */
function step1(){
  app.innerHTML=`
    <h1>Truth Mode: ON 🫶</h1>
    <p>I messed up.</p>
    <p class="small">No excuses. Just honesty.</p>
    <button onclick="clickSound();choices()">Okay…</button>`;
}

function choices(){
  app.innerHTML=`
    <h1>Heart Check 💗</h1>
    <p>What happens next?</p>
    <div class="buttons">
      <button class="btn-angry" id="dodgeBtn">Option A: Stay mad 😠</button>
      <button class="btn-soft" onclick="clickSound();result()">Option B: Hear me out 👀</button>
    </div>
    <p class="small">(Option A thinks it’s funny)</p>`;

  const btn=document.getElementById("dodgeBtn");
  document.addEventListener("mousemove",e=>{
    const r=btn.getBoundingClientRect();
    const d=Math.hypot(
      e.clientX-(r.left+r.width/2),
      e.clientY-(r.top+r.height/2)
    );
    if(d<140){
      dodgeSound();
      btn.style.transform=
        `translate(${Math.random()*360-180}px,${Math.random()*120-60}px)`;
    }
  });
}

function result(){
  app.innerHTML=`
    <h1>Thank You 💞</h1>
    <p>I really appreciate you giving me a moment.</p>
    <p class="small">I care about how you feel.</p>
    <button onclick="final()">One Last Thing</button>`;
}

function final(){
  song.currentTime = 0;
  song.volume = 1;
  song.play();

  app.innerHTML=`
    <h1>The Part I Mean 💖</h1>
    <p>You know that smile?</p>
    <p><strong>The one you try to hide but can’t?</strong></p>
    <p class="small">That’s the smile I cherish.</p>
    <img src="pic1.jpg" class="photo" />
  `;

  setTimeout(()=>{
    fadeOutMusic();

    const video=document.createElement("video");
    video.src="video.mp4";
    video.autoplay=true;
    video.controls=false;
    app.appendChild(video);

    video.onended=()=>{
      video.remove();
      fadeInMusic();
      endScreen();
    };
  },10000);
}

function endScreen(){
  document.body.classList.add("fade-out");
  setTimeout(()=>{
    app.innerHTML=`
      <h1 style="color:#fff">No pressure 🤍</h1>
      <p style="color:#ddd">Take all the time you need.</p>
      <p style="color:#aaa" class="small">I’ll be right here.</p>
    `;
  },1200);
}
</script>

</body>
</html>
